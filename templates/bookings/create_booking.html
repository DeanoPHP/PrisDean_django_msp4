{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="col-lg-6">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="text-center mb-4">
                    Book an Oven Clean
                </h2>

                <form method="POST">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary"></button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
