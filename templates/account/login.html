{% extends "base.html" %}

{% block content %}
<div class="container my-5">
    <h1>Login</h1>

    <form method="POST" action="{% url 'account_login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
</div>
{% endblock %}
