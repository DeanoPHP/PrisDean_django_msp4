{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body p-4 text-center">

                    <h2 class="mb-4">
                        Logout
                    </h2>

                    <p>
                        Are you sure you want to sign out?
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <button type="submit"
                                class="btn btn-danger">
                            Logout
                        </button>

                        <a href="{% url 'home' %}"
                           class="btn btn-secondary">
                            Cancel
                        </a>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
